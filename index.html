<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>字幕拼接器 · 极简双模工作台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-app: #f0f4f9;
            --card-bg: #ffffff;
            --text-main: #0a1c2f;
            --text-soft: #1e2f44;
            --text-muted: #5c6f87;
            --accent: #3b82f6;
            --accent-light: #eef4ff;
            --accent-dark: #2563eb;
            --border-light: #e9edf2;
            --success: #10b981;
            --success-bg: #e9f9f0;
            --warning: #f59e0b;
            --warning-bg: #fffaec;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --radius-xl: 20px;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.02), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 32px rgba(0, 0, 0, 0.08), 0 4px 8px rgba(0, 0, 0, 0.02);
            --transition-brisk: 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-app);
            color: var(--text-main);
            font-size: 13px;
            line-height: 1.45;
            font-weight: 500;
        }

        /* 顶部标签栏 - 毛玻璃高级感 */
        .top-tab-bar {
            position: sticky;
            top: 20px;
            margin: 12px auto;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 60px;
            padding: 6px;
            display: flex;
            gap: 10px;
            z-index: 100;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06), 0 0 0 1px rgba(255, 255, 255, 0.6);
            width: fit-content;
            min-width: 280px;
            border: 0.5px solid rgba(255, 255, 255, 0.8);
        }

        .tab-btn {
            padding: 8px 26px;
            font-size: 14px;
            font-weight: 600;
            color: #4c5e7a;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s ease;
            letter-spacing: -0.2px;
            background: transparent;
            text-align: center;
            white-space: nowrap;
        }

        .tab-btn i {
            margin-right: 8px;
            font-style: normal;
            font-weight: 500;
        }

        .tab-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transform: scale(1.02);
        }

        .content-wrapper {
            padding: 15px 28px 40px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .tab-pane {
            display: none;
            animation: fadeSlide 0.35s ease-out;
        }

        .tab-pane.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片新美学 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(233, 237, 242, 0.8);
            box-shadow: var(--shadow-md);
            margin-bottom: 10px;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            font-weight: 700;
            font-size: 14px;
            background: #fefefe;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.2px;
        }

        .card-header i {
            font-size: 18px;
            color: var(--accent);
        }

        .card-body {
            padding: 0px 20px 15px;
        }

        /* 视频双栏 */
        .video-dashboard {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .video-player-area {
            flex: 2;
            min-width: 300px;
        }

        .video-control-area {
            flex: 1.2;
            min-width: 280px;
        }

        .video-wrapper {
            position: relative;
            background: #0a0f1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transition: all 0.2s;
        }

        video {
            height: 530px;
            width: 100%;
            display: block;
            background: #000;
        }

        .canvas-overlay {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: auto;
            cursor: crosshair;
        }

        /* 表单优雅 */
        .coord-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .coord-item label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-soft);
            letter-spacing: 0.3px;
        }

        input,
        select,
        textarea {
            font-family: 'Inter', monospace;
            font-size: 13px;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            background: #ffffff;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            width: 100%;
            font-weight: 500;
            outline: none;
        }

        #i-format {
            width: 60%;
            margin-left: 20px;
        }

        input {
            width: 60%;
            margin-left: 20px;
        }


        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }

        input[type="file"] {
            padding: 8px 12px;
            background: #fafcff;
            border: 1.5px dashed #cbd5e1;
            border-radius: 18px;
            cursor: pointer;
        }

        input[type="file"]::file-selector-button {
            padding: 6px 16px;
            border-radius: 30px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            border: none;
            margin-right: 12px;
            transition: 0.15s;
        }

        /* 按钮灵动 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 12.5px;
            font-weight: 600;
            border: none;
            background: #f1f5f9;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 6px rgba(59, 130, 246, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(59, 130, 246, 0.25);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #0d9f6e;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #cbd5e1;
        }

        .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 13.5px;
        }

        .status-bar {
            background: #f8fafc;
            border-radius: 40px;
            padding: 10px 18px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 16px;
            border: 1px solid #eef2f6;
            font-weight: 500;
        }

        .status-bar.success {
            background: var(--success-bg);
            border-color: #c8f0dd;
            color: #0b5e42;
        }

        .status-bar.processing {
            background: var(--warning-bg);
            border-color: #ffe1b3;
            color: #b45309;
        }

        .status-bar.error {
            background: var(--danger-bg);
            border-color: #fcd9d9;
            color: #b91c1c;
        }

        .dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
        }

        .processing .dot {
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.5;
                transform: scale(1.3);
            }
        }

        .result-canvas {
            width: 100%;
            height: auto;
            border-radius: 20px;
            border: 1px solid #eef2f8;
            background: #fff;
            box-shadow: var(--shadow-sm);
        }

        /* 图片模块 */
        .img-grid {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
        }

        .img-preview-area {
            flex: 2;
            min-width: 280px;
        }

        .img-settings {
            flex: 1.2;
            min-width: 260px;
        }

        .carousel-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            background: #fefefe;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-light);
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.02), 0 4px 12px rgba(0, 0, 0, 0.02);
        }

        #i-canvas {
            margin: 0 auto;
            max-width: 100%;
            height: auto;
            border-radius: 16px;
            cursor: ns-resize;
            transition: 0.1s;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 12px 0;
            align-items: center;
        }

        .info-bar {
            background: #f7fafd;
            border-radius: 40px;
            padding: 8px 20px;
            font-size: 11px;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            font-weight: 500;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
            font-weight: 500;
        }

        textarea {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            resize: vertical;
        }

        @media (max-width: 780px) {

            .video-dashboard,
            .img-grid {
                flex-direction: column;
            }

            .content-wrapper {
                padding: 16px;
            }

            .top-tab-bar {
                top: 12px;
                margin: 0 12px;
                width: calc(100% - 24px);
                justify-content: center;
            }

            .tab-btn {
                padding: 6px 18px;
                font-size: 12px;
            }
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #b9c4d1;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="top-tab-bar">
        <div class="tab-btn active" data-tab="video"><i>🎬</i> 视频字幕提取</div>
        <div class="tab-btn" data-tab="image"><i>🖼️</i> 智能图片拼接</div>
    </div>

    <div class="content-wrapper">
        <!-- 视频模块 -->
        <div id="video-pane" class="tab-pane active">
            <div class="video-dashboard">
                <div class="video-player-area">
                    <div class="card">
                        <div class="card-header"><i>📽️</i> 视频画布 · 框选字幕区</div>
                        <div class="card-body">
                            <input type="file" id="v-file" accept="video/*" style="margin-bottom: 16px;">
                            <div id="v-file-info"
                                style="font-size: 12px; margin-bottom: 12px; color: var(--text-muted);"></div>
                            <div class="video-wrapper" id="v-wrapper">
                                <video id="v-player" controls></video>
                                <canvas id="v-canvas" class="canvas-overlay"></canvas>
                            </div>
                            <div style="font-size: 11px; margin-top: 12px; color: #5f7f9e;">💡 鼠标拖拽框选字幕区域，坐标自动同步</div>
                        </div>
                    </div>
                    <div class="card result-card" id="v-result-section" style="display:none">
                        <div class="card-header"><i>✨</i> 拼接长图 · 预览</div>
                        <div class="card-body">
                            <canvas id="v-result-canvas" class="result-canvas"></canvas>
                            <button class="btn btn-success" id="v-btn-save" style="margin-top: 16px;">💾 保存长图</button>
                        </div>
                    </div>
                </div>

                <div class="video-control-area">
                    <div class="card">
                        <div class="card-header"><i>✂️</i> 裁剪区域 · 微调</div>
                        <div class="card-body">
                            <div class="coord-grid">
                                <div class="coord-item"><label>上 Y1</label><input type="number" id="v-y1"
                                        placeholder="y1"></div>
                                <div class="coord-item"><label>下 Y2</label><input type="number" id="v-y2"
                                        placeholder="y2"></div>
                                <div class="coord-item"><label>左 X1</label><input type="number" id="v-x1"
                                        placeholder="x1"></div>
                                <div class="coord-item"><label>右 X2</label><input type="number" id="v-x2"
                                        placeholder="x2"></div>
                            </div>
                            <button class="btn btn-primary btn-sm" id="v-btn-apply-coord" style="width:100%">✓
                                应用裁剪区域</button>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i>⏱️</i> 时间标记 · 空格/Enter</div>
                        <div class="card-body">
                            <div class="btn-group-flex" style="display: flex; gap: 10px; margin-bottom: 12px;">
                                <button class="btn" id="v-btn-mark">⏺ 标记当前帧</button>
                                <button class="btn" id="v-btn-del-last">↩ 撤销</button>
                                <button class="btn" id="v-btn-clear">🗑 清空</button>
                            </div>
                            <textarea id="v-time-list" rows="3"
                                placeholder="时间点列表 (支持手动编辑)&#10;格式: 1. 00:00:05.000 (帧:150)"></textarea>
                            <button class="btn btn-outline btn-sm" id="v-btn-apply" style="margin-top: 10px;">📋
                                解析并应用文本</button>
                            <div class="form-hint" style="margin-top: 18px;float: right;">✨ 留空则自动按每秒均匀提取</div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header"><i>🎨</i> 拼接样式 & 导出</div>
                        <div class="card-body">
                            <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;">
                                <div style="flex:1"><label style="font-size:11px;">背景色</label><input type="text"
                                        id="v-bg" value="#ffffff"></div>
                                <div style="flex:1"><label style="font-size:11px;">间距(px)</label><input type="number"
                                        id="v-spacing" value="2" min="0"></div>
                                <div style="flex:1"><label style="font-size:11px;">格式</label><select id="v-format">
                                        <option value="png">PNG</option>
                                        <option value="jpeg">JPEG</option>
                                    </select></div>
                            </div>
                            <button class="btn btn-primary btn-block" id="v-btn-extract">✨ 智能提取并拼接</button>
                        </div>
                    </div>
                    <div class="status-bar" id="v-status"><span class="dot"></span>就绪 · 上传视频后框选区域</div>
                </div>
            </div>
        </div>

        <!-- 图片拼接模块 -->
        <div id="image-pane" class="tab-pane">
            <div class="img-grid">
                <div class="img-preview-area">
                    <div class="card">
                        <div class="card-header"><i>🖼️</i> 字幕图片序列</div>
                        <div class="card-body">
                            <div style="display: flex; gap: 12px; margin-bottom: 16px;">
                                <button class="btn btn-primary" id="i-btn-add">⊕ 选择图片(多选)</button>
                                <button class="btn" id="i-btn-clear">✕ 清空全部</button>
                            </div>
                            <input type="file" id="i-file" accept="image/*" multiple style="display:none">
                            <div class="carousel-stage" id="i-carousel">
                                <canvas id="i-canvas" style="display:none; max-width:100%"></canvas>
                                <div class="empty-state" id="i-empty">
                                    <div>🖼️</div>
                                    <p>暂无图片，点击上方添加</p>
                                </div>
                            </div>
                            <div class="nav-bar">
                                <button class="btn btn-sm" id="i-btn-prev">← 上一张</button>
                                <span id="i-page" style="font-weight:700">0/0</span>
                                <button class="btn btn-sm" id="i-btn-next">下一张 →</button>
                            </div>
                            <div class="info-bar">
                                <span>📄 数量: <strong id="i-info-count">0</strong></span>
                                <span>🖼️ 当前: <strong id="i-info-file">-</strong></span>
                                <span>📐 尺寸: <strong id="i-info-size">-</strong></span>
                                <span>💾 大小: <strong id="i-info-mem">-</strong></span>
                            </div>
                        </div>
                    </div>
                    <div class="card result-card" id="i-result-section" style="display:none">
                        <div class="card-header"><i>✅</i> 拼接预览</div>
                        <div class="card-body"><canvas id="i-result-canvas" class="result-canvas"></canvas><button
                                class="btn btn-success" id="i-btn-save" style="margin-top:16px">💾 保存长图</button></div>
                    </div>
                </div>

                <div class="img-settings">
                    <div class="card">
                        <div class="card-header"><i>📐</i> 同步裁剪 (红线上边界 / 蓝线下边界)</div>
                        <div class="card-body">
                            <div
                                style="margin-bottom: 16px; font-size:12px; background:#f4f9fe; padding: 10px; border-radius: 18px;">
                                🎯 第一张保留顶部→蓝线，后续保留红线→蓝线。<br>拖动画布线条实时同步。</div>
                            <div style="display: flex; gap: 12px; margin-bottom: 18px;">
                                <div style="flex:1"><label style="font-size:11px;">间距(px)</label><input type="number"
                                        id="i-spacing" value="0" min="0"></div>
                                <div style="flex:1"><label style="font-size:11px;">格式</label><select id="i-format">
                                        <option value="png">PNG</option>
                                        <option value="jpeg">JPEG</option>
                                    </select></div>
                            </div>
                            <button class="btn btn-success btn-block" id="i-btn-generate">🧩 生成长拼接图</button>
                        </div>
                    </div>
                    <div class="status-bar" id="i-status"><span class="dot"></span>就绪 · 添加图片后调整裁剪线</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
     * 字幕拼接器 - 双模工作台
     * 功能模块：视频字幕提取、图片序列拼接
     * @version 2.0
     */

        $(function () {
            // ========================= 全局工具函数 =========================

            /**
             * 将秒数转换为 SRT 时间格式 (HH:MM:SS.mmm)
             * @param {number} seconds - 时间（秒）
             * @returns {string} 格式化后的时间字符串
             */
            const formatTime = (seconds) => {
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = Math.floor(seconds % 60);
                const millis = Math.floor((seconds % 1) * 1000);
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${millis.toString().padStart(3, '0')}`;
            };

            /**
             * 格式化文件大小
             * @param {number} bytes - 字节数
             * @returns {string} 人类可读的文件大小
             */
            const formatBytes = (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            };

            /**
             * 解析并验证颜色值
             * @param {string} colorStr - 颜色字符串（支持 #fff, #ffffff, white）
             * @returns {string} 标准的 #ffffff 格式颜色
             */
            const parseColor = (colorStr) => {
                const c = colorStr.trim().toLowerCase();
                if (c === 'white') return '#ffffff';
                if (/^#[0-9a-f]{6}$/.test(c)) return c;
                if (/^#[0-9a-f]{3}$/.test(c)) {
                    return '#' + c[1] + c[1] + c[2] + c[2] + c[3] + c[3];
                }
                return '#ffffff';
            };

            /**
             * 更新状态栏样式和文字
             * @param {jQuery} $el - 状态栏 jQuery 元素
             * @param {string} msg - 状态消息
             * @param {string} type - 状态类型: 'success', 'processing', 'error', 空为普通
             */
            const setStatus = ($el, msg, type = '') => {
                $el.html(`<span class="dot"></span>${msg}`)
                    .removeClass('success processing error')
                    .addClass(type);
            };

            /**
             * 延迟函数
             * @param {number} ms - 延迟毫秒数
             * @returns {Promise} Promise 对象
             */
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            /**
             * 垂直拼接多张图片
             * @param {HTMLImageElement[]} images - 图片元素数组
             * @param {number} spacing - 图片间距（像素）
             * @param {string} bgColor - 背景色
             * @returns {HTMLCanvasElement} 拼接后的 Canvas
             */
            const stitchImagesVertically = (images, spacing, bgColor) => {
                // 计算最大宽度和总高度
                let maxWidth = 0;
                let totalHeight = 0;

                images.forEach((img, index) => {
                    maxWidth = Math.max(maxWidth, img.width);
                    totalHeight += img.height;
                    if (index < images.length - 1) totalHeight += spacing;
                });

                // 创建画布并绘制
                const canvas = document.createElement('canvas');
                canvas.width = maxWidth;
                canvas.height = totalHeight;
                const ctx = canvas.getContext('2d');

                // 填充背景
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, maxWidth, totalHeight);

                // 逐张绘制图片（居中）
                let currentY = 0;
                images.forEach((img, index) => {
                    const offsetX = Math.floor((maxWidth - img.width) / 2);
                    ctx.drawImage(img, offsetX, currentY);
                    currentY += img.height;
                    if (index < images.length - 1) currentY += spacing;
                });

                return canvas;
            };

            /**
             * 保存 Canvas 为图片文件
             * @param {HTMLCanvasElement} canvas - 目标 Canvas
             * @param {string} format - 格式 'png' 或 'jpeg'
             * @param {string} fileName - 文件名（不含扩展名）
             */
            const saveCanvasAsImage = (canvas, format, fileName) => {
                const mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
                canvas.toBlob(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `${fileName}.${format === 'jpeg' ? 'jpg' : 'png'}`;
                    link.click();
                    URL.revokeObjectURL(link.href);
                }, mimeType, 0.92);
            };

            /**
             * 裁剪图片
             * @param {HTMLImageElement} img - 原始图片
             * @param {number} x - 起始 X 坐标
             * @param {number} y - 起始 Y 坐标
             * @param {number} width - 裁剪宽度
             * @param {number} height - 裁剪高度
             * @returns {HTMLCanvasElement} 裁剪后的 Canvas
             */
            const cropImage = (img, x, y, width, height) => {
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, x, y, width, height, 0, 0, width, height);
                return canvas;
            };


            // ========================= 视频模块 =========================
            const VideoModule = {
                // 状态变量
                videoUrl: null,         // 视频对象 URL
                duration: 0,            // 视频总时长
                videoWidth: 0,          // 原始宽度
                videoHeight: 0,         // 原始高度
                timePoints: [],         // 标记的时间点数组 [{ timeSec, frameIdx }]
                cropRect: null,         // 裁剪区域 { x1, y1, x2, y2 }
                selecting: false,       // 是否正在框选
                selectionStart: null,   // 框选起始点
                selectionEnd: null,     // 框选结束点
                fps: 30                 // 默认帧率
            };

            // DOM 元素引用
            const $vFile = $('#v-file');
            const $vPlayer = $('#v-player');
            const $vCanvas = $('#v-canvas');
            const $vWrapper = $('#v-wrapper');
            const $vStatus = $('#v-status');
            const $vFileInfo = $('#v-file-info');
            const $vTimeList = $('#v-time-list');
            const $vResultSection = $('#v-result-section');
            const $vResultCanvas = $('#v-result-canvas');

            /**
             * 调整覆盖层 Canvas 尺寸以适应视频显示区域
             */
            const resizeOverlayCanvas = () => {
                const video = $vPlayer[0];
                if (!video || !video.videoWidth) return;

                const rect = video.getBoundingClientRect();
                $vCanvas.attr({
                    width: rect.width,
                    height: rect.height
                }).css({
                    width: rect.width + 'px',
                    height: rect.height + 'px',
                    left: 0,
                    top: 0
                });

                drawSelectionOverlay();
            };

            /**
             * 在视频覆盖层上绘制框选区域
             */
            const drawSelectionOverlay = () => {
                const canvas = $vCanvas[0];
                const ctx = canvas.getContext('2d');
                if (!canvas.width) return;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                let x = 0, y = 0, w = 0, h = 0;

                // 优先显示正在进行的框选
                if (VideoModule.selecting && VideoModule.selectionStart && VideoModule.selectionEnd) {
                    x = Math.min(VideoModule.selectionStart.x, VideoModule.selectionEnd.x);
                    y = Math.min(VideoModule.selectionStart.y, VideoModule.selectionEnd.y);
                    w = Math.abs(VideoModule.selectionEnd.x - VideoModule.selectionStart.x);
                    h = Math.abs(VideoModule.selectionEnd.y - VideoModule.selectionStart.y);
                }
                // 其次显示已保存的裁剪区域
                else if (VideoModule.cropRect) {
                    const rect = $vPlayer[0].getBoundingClientRect();
                    const scaleX = rect.width / VideoModule.videoWidth;
                    const scaleY = rect.height / VideoModule.videoHeight;
                    x = VideoModule.cropRect.x1 * scaleX;
                    y = VideoModule.cropRect.y1 * scaleY;
                    w = (VideoModule.cropRect.x2 - VideoModule.cropRect.x1) * scaleX;
                    h = (VideoModule.cropRect.y2 - VideoModule.cropRect.y1) * scaleY;
                } else {
                    return;
                }

                // 绘制半透明填充和虚线边框
                ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([6, 8]);
                ctx.strokeRect(x, y, w, h);
            };

            /**
             * 刷新时间点列表的文本显示
             */
            const refreshTimePointsList = () => {
                const lines = VideoModule.timePoints.map((point, index) => {
                    return `${index + 1}. ${formatTime(point.timeSec)} (帧:${point.frameIdx})`;
                });
                $vTimeList.val(lines.join('\n'));
            };

            /**
             * 从视频中捕获指定时间点的帧并裁剪
             * @param {string} videoUrl - 视频 URL
             * @param {number} timeSec - 时间点（秒）
             * @param {number} cropX - 裁剪起始 X
             * @param {number} cropY - 裁剪起始 Y
             * @param {number} cropW - 裁剪宽度
             * @param {number} cropH - 裁剪高度
             * @returns {Promise<HTMLCanvasElement|null>} 裁剪后的 Canvas
             */
            const captureVideoFrame = (videoUrl, timeSec, cropX, cropY, cropW, cropH) => {
                return new Promise((resolve) => {
                    const video = document.createElement('video');
                    video.src = videoUrl;
                    video.muted = true;
                    video.preload = 'auto';

                    let isResolved = false;
                    const timeout = setTimeout(() => {
                        if (!isResolved) {
                            isResolved = true;
                            resolve(null);
                        }
                    }, 10000);

                    video.addEventListener('loadeddata', () => {
                        video.currentTime = timeSec;
                    });

                    video.addEventListener('seeked', () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = cropW;
                        canvas.height = cropH;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

                        clearTimeout(timeout);
                        isResolved = true;
                        resolve(canvas);
                        video.src = ''; // 释放资源
                    });
                });
            };

            // ----- 视频模块事件绑定 -----

            /**
             * 视频文件选择处理
             */
            $vFile.on('change', function (event) {
                const file = event.target.files[0];
                if (!file) return;

                // 释放旧 URL
                if (VideoModule.videoUrl) {
                    URL.revokeObjectURL(VideoModule.videoUrl);
                }

                VideoModule.videoUrl = URL.createObjectURL(file);
                $vPlayer.attr('src', VideoModule.videoUrl);
                $vFileInfo.text(`${file.name} (${formatBytes(file.size)})`);
                setStatus($vStatus, '加载视频中...', 'processing');

                $vPlayer.on('loadedmetadata', function () {
                    VideoModule.duration = $vPlayer[0].duration;
                    VideoModule.videoWidth = $vPlayer[0].videoWidth;
                    VideoModule.videoHeight = $vPlayer[0].videoHeight;
                    VideoModule.cropRect = null;
                    VideoModule.timePoints = [];

                    // 重置坐标输入框
                    $('#v-x1').val(0);
                    $('#v-y1').val(0);
                    $('#v-x2').val(VideoModule.videoWidth);
                    $('#v-y2').val(VideoModule.videoHeight);

                    resizeOverlayCanvas();
                    setStatus($vStatus, `就绪 ${VideoModule.videoWidth}×${VideoModule.videoHeight} · 拖动框选字幕区`, 'success');
                });
            });

            /**
             * 窗口大小改变时重新调整覆盖层
             */
            $(window).on('resize', () => {
                if (VideoModule.videoUrl) resizeOverlayCanvas();
            });

            /**
             * 视频元数据加载完成后延迟调整覆盖层
             */
            $vPlayer.on('loadedmetadata', () => {
                setTimeout(resizeOverlayCanvas, 60);
            });

            /**
             * 鼠标框选开始
             */
            $vWrapper.on('mousedown', function (event) {
                if (!$vPlayer[0].src) return;

                const rect = $vPlayer[0].getBoundingClientRect();
                VideoModule.selecting = true;
                VideoModule.selectionStart = {
                    x: event.clientX - rect.left,
                    y: event.clientY - rect.top
                };
                VideoModule.selectionEnd = { ...VideoModule.selectionStart };
            });

            /**
             * 鼠标移动时更新框选区域
             */
            $(window).on('mousemove', function (event) {
                if (!VideoModule.selecting) return;

                const rect = $vPlayer[0].getBoundingClientRect();
                VideoModule.selectionEnd = {
                    x: Math.min(rect.width, Math.max(0, event.clientX - rect.left)),
                    y: Math.min(rect.height, Math.max(0, event.clientY - rect.top))
                };
                drawSelectionOverlay();
            });

            /**
             * 鼠标释放，完成框选并保存裁剪区域
             */
            $(window).on('mouseup', function () {
                if (!VideoModule.selecting) return;
                VideoModule.selecting = false;

                if (VideoModule.selectionStart && VideoModule.selectionEnd) {
                    const rect = $vPlayer[0].getBoundingClientRect();
                    const scaleX = VideoModule.videoWidth / rect.width;
                    const scaleY = VideoModule.videoHeight / rect.height;

                    let x1 = Math.min(VideoModule.selectionStart.x, VideoModule.selectionEnd.x) * scaleX;
                    let y1 = Math.min(VideoModule.selectionStart.y, VideoModule.selectionEnd.y) * scaleY;
                    let x2 = Math.max(VideoModule.selectionStart.x, VideoModule.selectionEnd.x) * scaleX;
                    let y2 = Math.max(VideoModule.selectionStart.y, VideoModule.selectionEnd.y) * scaleY;

                    if (x2 - x1 > 5 && y2 - y1 > 5) {
                        VideoModule.cropRect = {
                            x1: Math.floor(x1),
                            y1: Math.floor(y1),
                            x2: Math.ceil(x2),
                            y2: Math.ceil(y2)
                        };

                        $('#v-x1').val(VideoModule.cropRect.x1);
                        $('#v-y1').val(VideoModule.cropRect.y1);
                        $('#v-x2').val(VideoModule.cropRect.x2);
                        $('#v-y2').val(VideoModule.cropRect.y2);

                        setStatus($vStatus, '字幕区已设定', 'success');
                        drawSelectionOverlay();
                    }
                }
            });

            /**
             * 应用手动输入的裁剪坐标
             */
            $('#v-btn-apply-coord').on('click', () => {
                const x1 = parseInt($('#v-x1').val()) || 0;
                const y1 = parseInt($('#v-y1').val()) || 0;
                const x2 = parseInt($('#v-x2').val()) || 0;
                const y2 = parseInt($('#v-y2').val()) || 0;

                if (x1 >= x2 || y1 >= y2) {
                    setStatus($vStatus, '坐标无效（右边界必须大于左边界，下边界必须大于上边界）', 'error');
                    return;
                }

                VideoModule.cropRect = { x1, y1, x2, y2 };
                drawSelectionOverlay();
                setStatus($vStatus, '裁剪区域已应用', 'success');
            });

            /**
             * 提取并拼接字幕（核心功能）
             */
            $('#v-btn-extract').on('click', async function () {
                const $btn = $(this);

                // 校验前置条件
                if (!VideoModule.videoUrl) {
                    setStatus($vStatus, '请先上传视频文件', 'error');
                    return;
                }

                if (!VideoModule.cropRect) {
                    setStatus($vStatus, '请先框选字幕区域', 'error');
                    return;
                }

                $btn.prop('disabled', true);

                try {
                    // 获取时间点列表（如果没有标记则自动按每秒提取）
                    let timePoints = VideoModule.timePoints;
                    if (timePoints.length === 0) {
                        timePoints = [];
                        for (let i = 0; i <= Math.floor(VideoModule.duration); i++) {
                            timePoints.push({
                                timeSec: i,
                                frameIdx: Math.round(i * VideoModule.fps)
                            });
                        }
                    }

                    const { x1, y1, x2, y2 } = VideoModule.cropRect;
                    const cropWidth = x2 - x1;
                    const cropHeight = y2 - y1;
                    const capturedImages = [];

                    // 逐帧捕获
                    for (let i = 0; i < timePoints.length; i++) {
                        setStatus($vStatus, `正在提取 ${i + 1}/${timePoints.length}`, 'processing');
                        const frameCanvas = await captureVideoFrame(
                            VideoModule.videoUrl,
                            timePoints[i].timeSec,
                            x1, y1, cropWidth, cropHeight
                        );
                        if (frameCanvas) capturedImages.push(frameCanvas);
                        await sleep(25);
                    }

                    if (capturedImages.length === 0) {
                        setStatus($vStatus, '未提取到有效的字幕帧', 'error');
                        return;
                    }

                    // 执行拼接
                    const spacing = parseInt($('#v-spacing').val()) || 0;
                    const bgColor = parseColor($('#v-bg').val());
                    const resultCanvas = stitchImagesVertically(capturedImages, spacing, bgColor);

                    // 显示结果
                    $vResultCanvas.attr({
                        width: resultCanvas.width,
                        height: resultCanvas.height
                    })[0].getContext('2d').drawImage(resultCanvas, 0, 0);

                    $vResultSection.show();
                    $vResultSection[0].scrollIntoView({ behavior: 'smooth', block: 'start' });

                    setStatus($vStatus, `拼接成功！尺寸 ${resultCanvas.width} × ${resultCanvas.height}`, 'success');
                } catch (error) {
                    console.error('拼接失败:', error);
                    setStatus($vStatus, '处理出错: ' + error.message, 'error');
                } finally {
                    $btn.prop('disabled', false);
                }
            });

            /**
             * 保存拼接结果图片
             */
            $('#v-btn-save').on('click', () => {
                saveCanvasAsImage($vResultCanvas[0], $('#v-format').val(), 'subtitle_long');
            });

            /**
             * 标记当前时间点
             */
            $('#v-btn-mark').on('click', () => {
                if (!VideoModule.videoUrl) return;

                const currentTime = $vPlayer[0].currentTime;
                VideoModule.timePoints.push({
                    timeSec: currentTime,
                    frameIdx: Math.round(currentTime * VideoModule.fps)
                });

                refreshTimePointsList();
                setStatus($vStatus, `已标记 ${VideoModule.timePoints.length} 个时间点`, 'success');
            });

            /**
             * 撤销最后一个时间点
             */
            $('#v-btn-del-last').on('click', () => {
                VideoModule.timePoints.pop();
                refreshTimePointsList();
            });

            /**
             * 清空所有时间点
             */
            $('#v-btn-clear').on('click', () => {
                VideoModule.timePoints = [];
                refreshTimePointsList();
                setStatus($vStatus, '时间点已清空');
            });

            /**
             * 解析并应用手动编辑的时间点文本
             */
            $('#v-btn-apply').on('click', () => {
                const text = $vTimeList.val();

                if (!text.trim()) {
                    VideoModule.timePoints = [];
                    refreshTimePointsList();
                    setStatus($vStatus, '已清空时间点');
                    return;
                }

                const lines = text.split('\n');
                const newPoints = [];
                // 正则匹配格式: 00:00:05.000 (帧:150)
                const regex = /(\d{2}):(\d{2}):(\d{2})(?:\.(\d{3}))?\s*\(帧:\s*(\d+)\)/;

                lines.forEach(line => {
                    const match = line.match(regex);
                    if (match) {
                        const hours = parseInt(match[1]);
                        const minutes = parseInt(match[2]);
                        const seconds = parseInt(match[3]);
                        const millis = match[4] ? parseInt(match[4]) : 0;
                        const timeSec = hours * 3600 + minutes * 60 + seconds + millis / 1000;
                        const frameIdx = parseInt(match[5]);
                        newPoints.push({ timeSec, frameIdx });
                    }
                });

                if (newPoints.length > 0) {
                    VideoModule.timePoints = newPoints;
                }

                refreshTimePointsList();
                setStatus($vStatus, `已应用 ${VideoModule.timePoints.length} 个时间点`, 'success');
            });

            /**
             * 全局键盘快捷键
             * Enter: 标记当前时间点
             * 空格: 播放/暂停
             */
            $(document).on('keydown', (event) => {
                const isVideoActive = $('#video-pane').hasClass('active');
                const isInputFocused = event.target.matches('input, textarea');

                if (isVideoActive && !isInputFocused && event.key === 'Enter') {
                    event.preventDefault();
                    $('#v-btn-mark').click();
                }

                if (isVideoActive && !isInputFocused && event.key === ' ') {
                    event.preventDefault();
                    const video = $vPlayer[0];
                    if (video.paused) {
                        video.play();
                    } else {
                        video.pause();
                    }
                }
            });


            // ========================= 图片模块 =========================
            const ImageModule = {
                images: [],      // 图片对象数组 [{ name, width, height, size, url, img }]
                currentIndex: 0, // 当前预览索引
                topCutRatio: 0.80,   // 上裁剪线比例（红线，后续图片保留区域起点）
                bottomCutRatio: 0.95, // 下裁剪线比例（蓝线，所有图片保留区域终点）
                dragging: null   // 拖拽状态: 'top' 或 'bottom'
            };

            // DOM 元素引用
            const $iCanvas = $('#i-canvas');
            const $iEmpty = $('#i-empty');
            const $iStatus = $('#i-status');
            const $iFile = $('#i-file');

            /**
             * 渲染当前图片的预览和裁剪线
             */
            const renderImagePreview = () => {
                if (ImageModule.images.length === 0) return;

                const currentImage = ImageModule.images[ImageModule.currentIndex];
                const canvas = $iCanvas[0];
                const $container = $('#i-carousel');

                // 计算缩放比例
                const maxWidth = Math.min($container.width() - 30, 620);
                const maxHeight = 400;
                const scaleX = maxWidth / currentImage.width;
                const scaleY = maxHeight / currentImage.height;
                const scale = Math.min(scaleX, scaleY, 1);

                const displayWidth = Math.round(currentImage.width * scale);
                const displayHeight = Math.round(currentImage.height * scale);

                canvas.width = displayWidth;
                canvas.height = displayHeight;
                $(canvas).css('display', 'block');

                const ctx = canvas.getContext('2d');
                ctx.drawImage(currentImage.img, 0, 0, displayWidth, displayHeight);

                // 计算裁剪线位置（基于显示尺寸）
                const topLineY = ImageModule.topCutRatio * displayHeight;
                const bottomLineY = ImageModule.bottomCutRatio * displayHeight;

                // 绘制半透明遮罩（裁剪区域以外的部分）
                ctx.fillStyle = 'rgba(0, 0, 0, 0.18)';
                ctx.fillRect(0, 0, displayWidth, topLineY);           // 顶部遮罩
                ctx.fillRect(0, bottomLineY, displayWidth, displayHeight - bottomLineY); // 底部遮罩

                // 绘制红色上裁剪线
                ctx.beginPath();
                ctx.strokeStyle = '#ef4444';
                ctx.lineWidth = 2.5;
                ctx.setLineDash([6, 6]);
                ctx.moveTo(0, topLineY);
                ctx.lineTo(displayWidth, topLineY);
                ctx.stroke();

                // 绘制蓝色下裁剪线
                ctx.beginPath();
                ctx.strokeStyle = '#3b82f6';
                ctx.moveTo(0, bottomLineY);
                ctx.lineTo(displayWidth, bottomLineY);
                ctx.stroke();
                ctx.setLineDash([]);

                // 添加文字标签
                ctx.font = 'bold 11px Inter';
                ctx.fillStyle = '#ef4444';
                ctx.fillText('上边界（后续图片保留起点）', 6, topLineY - 4);
                ctx.fillStyle = '#3b82f6';
                ctx.fillText('下边界（所有图片保留终点）', 6, bottomLineY + 12);

                // 更新页码
                $('#i-page').text(`${ImageModule.currentIndex + 1} / ${ImageModule.images.length}`);
            };

            /**
             * 更新图片信息栏显示
             */
            const updateImageInfo = () => {
                $('#i-info-count').text(ImageModule.images.length);

                if (ImageModule.images[ImageModule.currentIndex]) {
                    const img = ImageModule.images[ImageModule.currentIndex];
                    $('#i-info-file').text(img.name);
                    $('#i-info-size').text(`${img.width} × ${img.height}`);
                    $('#i-info-mem').text(formatBytes(img.size));
                } else {
                    $('#i-info-file').text('-');
                    $('#i-info-size').text('-');
                    $('#i-info-mem').text('-');
                }
            };

            /**
             * 清空所有图片
             */
            const clearAllImages = () => {
                // 释放对象 URL
                ImageModule.images.forEach(img => {
                    if (img.url) URL.revokeObjectURL(img.url);
                });
                ImageModule.images = [];
                ImageModule.currentIndex = 0;

                $iEmpty.show();
                $iCanvas.hide();
                $('#i-result-section').hide();
                updateImageInfo();
                setStatus($iStatus, '已清空所有图片');
            };

            // ----- 图片模块事件绑定 -----

            /**
             * 添加图片按钮 - 触发文件选择
             */
            $('#i-btn-add').on('click', () => $iFile.click());

            /**
             * 图片文件选择处理（支持多选）
             */
            $iFile.on('change', async function (event) {
                const files = Array.from(event.target.files);

                for (const file of files) {
                    const url = URL.createObjectURL(file);
                    const img = await new Promise((resolve) => {
                        const image = new Image();
                        image.onload = () => resolve(image);
                        image.src = url;
                    });

                    ImageModule.images.push({
                        name: file.name,
                        width: img.width,
                        height: img.height,
                        size: file.size,
                        url: url,
                        img: img
                    });
                }

                if (ImageModule.images.length > 0) {
                    ImageModule.currentIndex = 0;
                    $iEmpty.hide();
                }

                renderImagePreview();
                updateImageInfo();
                setStatus($iStatus, `已加载 ${ImageModule.images.length} 张图片`, 'success');
                $iFile.val(''); // 清空 input 以便再次选择相同文件
            });

            /**
             * 上一张图片
             */
            $('#i-btn-prev').on('click', () => {
                if (ImageModule.images.length === 0) return;
                ImageModule.currentIndex = (ImageModule.currentIndex - 1 + ImageModule.images.length) % ImageModule.images.length;
                renderImagePreview();
                updateImageInfo();
            });

            /**
             * 下一张图片
             */
            $('#i-btn-next').on('click', () => {
                if (ImageModule.images.length === 0) return;
                ImageModule.currentIndex = (ImageModule.currentIndex + 1) % ImageModule.images.length;
                renderImagePreview();
                updateImageInfo();
            });

            /**
             * 清空所有图片
             */
            $('#i-btn-clear').on('click', clearAllImages);

            /**
             * 裁剪线拖拽交互 - 鼠标按下
             */
            $iCanvas.on('mousedown', function (event) {
                if (ImageModule.images.length === 0) return;

                const rect = $iCanvas[0].getBoundingClientRect();
                const clickY = (event.clientY - rect.top) / rect.height;

                if (Math.abs(clickY - ImageModule.topCutRatio) < 0.05) {
                    ImageModule.dragging = 'top';
                } else if (Math.abs(clickY - ImageModule.bottomCutRatio) < 0.05) {
                    ImageModule.dragging = 'bottom';
                }
            });

            /**
             * 裁剪线拖拽交互 - 鼠标移动
             */
            $(window).on('mousemove', function (event) {
                if (!ImageModule.dragging || ImageModule.images.length === 0) return;

                const rect = $iCanvas[0].getBoundingClientRect();
                let ratio = (event.clientY - rect.top) / rect.height;
                ratio = Math.min(0.98, Math.max(0.02, ratio));

                if (ImageModule.dragging === 'top' && ratio < ImageModule.bottomCutRatio - 0.02) {
                    ImageModule.topCutRatio = ratio;
                }
                if (ImageModule.dragging === 'bottom' && ratio > ImageModule.topCutRatio + 0.02) {
                    ImageModule.bottomCutRatio = ratio;
                }

                renderImagePreview();
            });

            /**
             * 裁剪线拖拽交互 - 鼠标释放
             */
            $(window).on('mouseup', () => {
                ImageModule.dragging = null;
            });

            /**
             * 生成长拼接图
             */
            $('#i-btn-generate').on('click', async function () {
                const $btn = $(this);

                if (ImageModule.images.length === 0) {
                    setStatus($iStatus, '请先添加图片', 'error');
                    return;
                }

                $btn.prop('disabled', true);

                try {
                    const spacing = parseInt($('#i-spacing').val()) || 0;
                    const croppedImages = [];

                    for (let i = 0; i < ImageModule.images.length; i++) {
                        const imgData = ImageModule.images[i];
                        const imgHeight = imgData.height;

                        if (i === 0) {
                            // 第一张图片：从顶部裁剪到蓝色下边界
                            const cropHeight = Math.round(imgHeight * ImageModule.bottomCutRatio);
                            croppedImages.push(cropImage(imgData.img, 0, 0, imgData.width, cropHeight));
                        } else {
                            // 后续图片：从红色上边界裁剪到蓝色下边界
                            const cropY = Math.round(imgHeight * ImageModule.topCutRatio);
                            const cropHeight = Math.round(imgHeight * ImageModule.bottomCutRatio) - cropY;
                            croppedImages.push(cropImage(imgData.img, 0, cropY, imgData.width, cropHeight));
                        }
                    }

                    const resultCanvas = stitchImagesVertically(croppedImages, spacing, '#ffffff');
                    const $resultCanvas = $('#i-result-canvas');

                    $resultCanvas.attr({
                        width: resultCanvas.width,
                        height: resultCanvas.height
                    })[0].getContext('2d').drawImage(resultCanvas, 0, 0);

                    $('#i-result-section').show();
                    $('#i-result-section')[0].scrollIntoView({ behavior: 'smooth' });

                    setStatus($iStatus, `拼接完成！尺寸 ${resultCanvas.width} × ${resultCanvas.height}`, 'success');
                } catch (error) {
                    console.error('图片拼接失败:', error);
                    setStatus($iStatus, '拼接失败: ' + error.message, 'error');
                } finally {
                    $btn.prop('disabled', false);
                }
            });

            /**
             * 保存图片拼接结果
             */
            $('#i-btn-save').on('click', () => {
                saveCanvasAsImage($('#i-result-canvas')[0], $('#i-format').val(), 'stitched_subtitles');
            });


            // ========================= Tab 切换模块 =========================

            /**
             * 顶部 Tab 切换逻辑
             */
            $('.tab-btn').on('click', function () {
                const tabId = $(this).data('tab');

                // 更新按钮状态
                $('.tab-btn').removeClass('active');
                $(this).addClass('active');

                // 切换面板
                $('.tab-pane').removeClass('active');
                if (tabId === 'video') {
                    $('#video-pane').addClass('active');
                    // 重新调整视频覆盖层尺寸
                    if (VideoModule.videoUrl) {
                        setTimeout(resizeOverlayCanvas, 80);
                    }
                } else {
                    $('#image-pane').addClass('active');
                }
            });
        });
    </script>
</body>

</html>
